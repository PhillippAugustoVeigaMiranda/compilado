# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — Compilado News Agent
# ─────────────────────────────────────────────────────────────────────────────
# Roda o agente automaticamente a cada 4 horas.
# As chaves ficam nos Secrets do repositório (nunca no código).
# Quando o agente adiciona artigos, faz commit do news_data.json atualizado
# e o Vercel publica o site automaticamente.
# ─────────────────────────────────────────────────────────────────────────────
name: Atualizar Notícias

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install anthropic feedparser requests

      - name: Rodar agente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python agent.py

      - name: Commit e push do news_data.json
        run: |
          git config user.name "Compilado Bot"
          git config user.email "bot@compilado.dev"
          git add news_data.json
          git diff --cached --quiet || git commit -m "bot: atualiza noticias [$(date '+%Y-%m-%d %H:%M')]"
          git push
